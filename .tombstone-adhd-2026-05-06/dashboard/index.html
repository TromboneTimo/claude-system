<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scan"></div>

<header class="hdr">
  <div class="hdr-l">
    <div class="brand">TASK <span class="brand-g">DASHBOARD</span></div>
    <div class="sub" id="today-label">loading...</div>
  </div>
  <div class="hdr-r">
    <div class="stat"><span class="stat-n" id="stat-today">.</span><span class="stat-l">today</span></div>
    <div class="stat"><span class="stat-n" id="stat-dl">.</span><span class="stat-l">deadlines 72h</span></div>
    <div class="stat"><span class="stat-n" id="stat-blocked">.</span><span class="stat-l">blocked</span></div>
    <div class="stat"><span class="stat-n" id="stat-shipped">.</span><span class="stat-l">shipped today</span></div>
    <div class="stat-refresh" id="refresh-ts">refreshing...</div>
  </div>
</header>

<main class="main">
  <section class="timeline-wrap">
    <div class="panel-title">
      <span class="pt-t">TODAY TIMELINE</span>
      <span class="pt-sub" id="timeline-sub">6am to 11pm JST</span>
    </div>
    <div class="timeline" id="timeline">
      <div class="timeline-empty">loading...</div>
    </div>
  </section>

  <aside class="side">
    <div class="card card-dl">
      <div class="card-t">DEADLINES 72H</div>
      <div class="card-body" id="panel-dl"></div>
    </div>
    <div class="card card-blocked">
      <div class="card-t">BLOCKED &amp; WAITING</div>
      <div class="card-body" id="panel-blocked"></div>
    </div>
    <div class="card card-shipped">
      <div class="card-t">SHIPPED TODAY <span class="dopamine">.</span></div>
      <div class="card-body" id="panel-shipped-today"></div>
    </div>
    <div class="card card-week">
      <div class="card-t">SHIPPED THIS WEEK <span class="t-expand" id="expand-week">[expand]</span></div>
      <div class="card-body card-collapsed" id="panel-shipped-week"></div>
    </div>
    <div class="card card-stale">
      <div class="card-t">STALE (7+ DAYS UNTOUCHED)</div>
      <div class="card-body" id="panel-stale"></div>
    </div>
    <div class="card card-parked">
      <div class="card-t">PARKED <span class="t-expand" id="expand-parked">[expand]</span></div>
      <div class="card-body card-collapsed" id="panel-parked"></div>
    </div>
  </aside>
</main>

<footer class="ftr">
  <span class="ftr-l">Read-only. Mutate via <code>/task</code> in Claude Code.</span>
  <span class="ftr-r" id="event-count">.</span>
</footer>

<!-- Initial state load. For file:// use, dashboard.js will swap this tag on poll. -->
<script src="../state/tasks.js" id="state-script"></script>
<script src="dashboard.js"></script>
</body>
</html>
